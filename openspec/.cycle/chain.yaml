name: verify-triage-applytest-explore
description: "Verify (GLM audits specs), triage (Kimi classifies issues), apply+test (Kimi fixes code), explore (Gemma diagnoses failures — no code edits). Loops until verify passes clean."

models:
  verify: glm-5.1:cloud
  triage: kimi-k2.6:cloud
  applytest: kimi-k2.6:cloud
  explore: gemma4:31b-cloud

kawa_core_model: gemma4:31b-cloud

agents:
  verify: verify-glm
  triage: triage-kimi
  applytest: applytest-kimi
  explore: explore-gemma

states:
  verify:
    description: "Audit specs, tasks, and code. Uses openspec-verify-change and kawa-check skills."
    agent: verify-glm
    model: glm-5.1:cloud
    tools: read,grep,find,ls,bash
    skills:
      - openspec-verify-change
      - kawa-check
    transitions:
      CLEAN: COMPLETE
      HAS_ISSUES: triage

  triage:
    description: "Classify verify issues: code fixes → Kimi, doc updates → self, scope increases → issues.md. Uses openspec-verify-change skill."
    agent: triage-kimi
    model: kimi-k2.6:cloud
    tools: read,write,edit,bash,grep,find,ls
    skills:
      - openspec-triage-change
      - openspec-verify-change
    transitions:
      HAS_CODE_FIXES: applytest
      DOCS_ONLY: COMPLETE
      CLEAN: COMPLETE

  applytest:
    description: "Apply fixes from triage or explore threads. Uses openspec-apply-change, kawa-check, and kawa-clean skills."
    agent: applytest-kimi
    model: kimi-k2.6:cloud
    tools: read,write,edit,bash,grep,find,ls
    skills:
      - openspec-apply-change
      - kawa-check
      - kawa-clean
    transitions:
      ALL_PASSED: verify
      HAS_FAILURES: explore

  explore:
    description: "Investigate failures, suggest threads. Uses openspec-explore skill. Read-only — no code edits."
    agent: explore-gemma
    model: gemma4:31b-cloud
    tools: read,grep,find,ls
    skills:
      - openspec-explore
    transitions:
      default: applytest

  COMPLETE:
    description: "Verify passed clean or triage found no code fixes. Cycle done."

guardrails:
  max_iterations: 3
  anti_loop: "If verify and applytest alternate more than 3 times without progress, force human intervention"
  requires_approval: false
  git_commit_on_handoff: true
  git_commit_message_template: "opsx: <phase> <iteration> for <change>"

handoff:
  method: text_pipe
  description: "Output of previous agent is piped as $INPUT to next agent. $ORIGINAL (initial user request) is carried through all phases."
  variables:
    $INPUT: "Output text from the previous phase agent"
    $ORIGINAL: "The user's initial request — carried unchanged through all phases"

orchestration:
  method: tmux
  session_prefix: "opsx-"
  layout: "orchestrator (left) + active phase (right)"
  phases_run_as: "pi subprocess in tmux pane"